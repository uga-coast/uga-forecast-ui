customHeaders:
  - pattern: /index.html
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate

  - pattern: /
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate

  - pattern: /assets/*
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
